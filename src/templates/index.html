<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychology RAG Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-brain"></i>
                <span>Psychology 2e</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <div class="history-list" id="history-list">
                <!-- History items will be injected here -->
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Psychology Student</span>
                </div>
            </div>
        </aside>
        
        <main class="chat-area">
            <header class="chat-header">
                <h1>Psychology 2e RAG</h1>
            </header>
            
            <div class="messages-container" id="messages-container">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="logo">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>Ask me anything from the Psychology 2e textbook.</p>
                </div>
            </div>
            
            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Message Psychology RAG..." rows="1"></textarea>
                    <button id="send-btn" disabled>
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <p class="disclaimer">Powered by NVIDIA Llama 3 70B. Responses are grounded in Psychology 2e.</p>
            </footer>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
